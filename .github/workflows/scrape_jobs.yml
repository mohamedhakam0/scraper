name: Daily MENA Automation Jobs Scraper v2

on:
  schedule:
    # 07:00 UTC = 09:00 Cairo time (EET)
    - cron: '0 7 * * *'
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install python-jobspy pandas requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated database and report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add jobs.db jobs_report.html
          git diff --staged --quiet || git commit -m "🤖 Daily job update: $(date -u '+%Y-%m-%d')"
          git push
